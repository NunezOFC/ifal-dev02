<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O que o JS pode fazer?</title>
</head>
<body>
    <h2>Js pode alterar o conteúdo da página</h2>
    
    <button onclick="document.getElementById('lampada').src = 'images/lightsaber_on.jpg'">Ligar</button>
    <button onclick="document.getElementById('lampada').src = 'images/lightsaber_off.jpg'">Desligar</button>

    <img id="lampada" src="/images/lightsaber_off.jpg">
</body>
</html>
