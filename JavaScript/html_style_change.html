<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O que o JS pode fazer?</title>
</head>
<body>
    <h2>Js pode alterar o conteúdo da página</h2>
    <p id="mensagem" style="font-size: smaller;">Leia-me</p>

    <button onclick="document.getElementById('mensagem').style.fontSize='45px'"> Zoom (+) </button>
    <button onclick="document.getElementById('mensagem').style.fontSize='25px'"> Zoom (-)</button>

    
</body>
</html>
